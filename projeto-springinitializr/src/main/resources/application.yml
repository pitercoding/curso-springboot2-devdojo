server:
  error:
    include-stacktrace: on_param

spring:
  application:
    name: springboot2-essentials
  datasource:
    url: jdbc:mysql://localhost:3306/anime?createDatabaseIfNotExist=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG

springdoc:
  packages-to-scan: com.pitercoding.projeto_springinitializr.controller

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: info, health, metrics, prometheus
  info:
    env:
      enabled: true

info:
  app:
    name: Spring Boot 2 Essentials Dev Dojo
    website: https://github.com/pitercoding
    github: https://github.com/pitercoding/curso-springboot2-devdojo
